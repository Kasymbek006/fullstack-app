name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master

        with:
          host: 164.92.240.187
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            cd /root/fullstack-app
            git pull
            docker-compose down
            docker-compose up -d --build
